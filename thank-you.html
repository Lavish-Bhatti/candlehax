<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      background: #0B0E14;
      color: #F2F0EB;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #12161F;
      border: 1px solid #232A38;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 420px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      background: #D4A853;
      color: #000;
      padding: 12px 22px;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.15s ease;
    }

    a:hover {
      background: #E4C580;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Thank You!</h1>
    <p>Your message has been sent successfully.</p>
    <a href="https://lavish-bhatti.github.io/candlehax/">Back to Home</a>
  </div>
</body>
</html>
