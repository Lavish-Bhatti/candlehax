<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candlehax — Links & Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14;
    --surface:#12161F;
    --surface-raised:#161B26;
    --line:#232A38;
    --accent:#D4A853;
    --accent-dim:#8A6F3A;
    --text:#F2F0EB;
    --text-dim:#8A8F98;
    --text-faint:#565C68;
    --radius:10px;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{scroll-behavior:smooth;}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  a{color:inherit; text-decoration:none;}

  ::selection{background:var(--accent); color:#0B0E14;}

  :focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
  }

  .wrap{
    max-width:820px;
    margin:0 auto;
    padding:0 24px;
  }

  /* ---------- LOGIN OVERLAY ---------- */
  #loginOverlay{
    position:fixed;
    inset:0;
    z-index:99999;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(11,14,20,0.96);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    padding:24px;
  }

  .login-card{
    width:min(430px, 100%);
    background:linear-gradient(180deg, rgba(18,22,31,0.98), rgba(13,17,24,0.98));
    border:1px solid rgba(212,168,83,0.22);
    border-radius:20px;
    padding:34px 28px 30px;
    box-shadow:0 24px 80px rgba(0,0,0,0.5);
    text-align:center;
    position:relative;
  }

  .login-logo{
    width:96px;
    height:96px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 18px;
    box-shadow:0 0 0 1px rgba(212,168,83,0.18), 0 0 40px -8px rgba(212,168,83,0.38);
    background:#0B0E14;
  }

  .login-card h2{
    font-family:var(--font-display);
    font-size:30px;
    line-height:1.1;
    margin-bottom:10px;
    letter-spacing:-0.02em;
  }

  .login-card p{
    color:var(--text-dim);
    font-size:14px;
    margin-bottom:22px;
  }

  .login-card .btn{
    width:100%;
    justify-content:center;
    margin-top:8px;
    border-radius:10px;
    padding:13px 18px;
    font-size:15px;
  }

  .user-meta{
    display:flex;
    flex-direction:column;
    gap:4px;
    margin-top:16px;
    color:var(--text-faint);
    font-size:12px;
  }

  .user-meta span:first-child{
    color:var(--text-dim);
  }

  /* ---------- HERO ---------- */
  .hero{
    padding:88px 0 40px;
    text-align:center;
  }

  .avatar{
    width:88px;
    height:88px;
    border-radius:50%;
    margin:0 auto 24px;
    object-fit:cover;
    display:block;
    box-shadow:0 0 0 1px var(--line), 0 0 40px -8px rgba(212,168,83,0.35);
  }

  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:14px;
  }

  h1{
    font-family:var(--font-display);
    font-weight:600;
    font-size:clamp(28px, 5vw, 40px);
    letter-spacing:-0.01em;
    margin-bottom:14px;
  }

  .tagline{
    color:var(--text-dim);
    font-size:16px;
    max-width:440px;
    margin:0 auto;
  }

  /* ---------- SIGNATURE TICKER ---------- */
  .ticker{
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    overflow:hidden;
    margin:40px 0 64px;
    background:var(--surface);
    white-space:nowrap;
  }

  .ticker-track{
    display:inline-flex;
    animation:scroll 28s linear infinite;
    padding:12px 0;
  }

  .ticker-track span{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    padding:0 20px;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }

  .ticker-track span.up{color:var(--accent);}
  .ticker-track .dot{color:var(--text-faint);}

  @keyframes scroll{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }

  @media (prefers-reduced-motion: reduce){
    .ticker-track{animation:none;}
  }

  /* ---------- SECTION SHARED ---------- */
  section{padding:0 0 72px;}

  .section-head{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin-bottom:28px;
  }

  .section-head .idx{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--accent);
  }

  .section-head h2{
    font-family:var(--font-display);
    font-weight:600;
    font-size:22px;
    letter-spacing:-0.005em;
  }

  .section-sub{
    color:var(--text-dim);
    font-size:14px;
    margin:-16px 0 28px;
  }

  /* ---------- SOCIAL GRID ---------- */
  .social-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
  }

  .social-card{
    display:flex;
    align-items:center;
    gap:14px;
    padding:18px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    transition:border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
  }

  .social-card:hover{
    border-color:var(--icon-color, var(--accent));
    transform:translateY(-2px);
    background:var(--surface-raised);
  }

  .social-icon{
    width:38px;
    height:38px;
    border-radius:9px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    background:var(--icon-color);
  }

  .social-icon svg{width:19px; height:19px; fill:#0B0E14;}

  .social-copy .label{
    font-weight:600;
    font-size:14px;
  }

  .social-copy .handle{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
  }

  /* ---------- BROKER CARDS ---------- */
  .broker-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px;
    margin-bottom:20px;
  }

  .broker-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }

  .broker-name{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:600;
    margin-bottom:4px;
  }

  .broker-desc{
    color:var(--text-dim);
    font-size:14px;
    max-width:360px;
  }

  .btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--accent);
    color:#0B0E14;
    font-weight:600;
    font-size:14px;
    padding:11px 20px;
    border-radius:7px;
    border:none;
    cursor:pointer;
    white-space:nowrap;
    transition:background 0.15s ease, transform 0.15s ease;
  }

  .btn:hover{background:#E4C580; transform:translateY(-1px);}

  .btn-arrow{font-family:var(--font-mono);}

  .steps{
    border-top:1px solid var(--line);
    padding-top:20px;
  }

  .steps-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-bottom:14px;
  }

  .steps ol{
    list-style:none;
    counter-reset:step;
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:16px;
  }

  .steps li{
    counter-increment:step;
    display:flex;
    gap:12px;
    font-size:14px;
    color:var(--text);
  }

  .steps li::before{
    content:counter(step);
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--accent);
    background:var(--surface-raised);
    border:1px solid var(--line);
    width:20px;
    height:20px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    margin-top:1px;
  }

  .code-chip{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 14px;
    font-family:var(--font-mono);
    font-size:13px;
  }

  .code-chip .code-label{
    color:var(--text-faint);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }

  .code-chip .code-value{
    color:var(--accent);
    font-weight:600;
  }

  .copy-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:var(--font-mono);
    font-size:11px;
    padding:4px 9px;
    border-radius:5px;
    cursor:pointer;
    margin-left:auto;
    transition:border-color 0.15s ease, color 0.15s ease;
  }

  .copy-btn:hover{border-color:var(--accent); color:var(--accent);}

  /* ---------- SUPPORT ---------- */
  .support-intro{
    color:var(--text-dim);
    font-size:14px;
    margin:-16px 0 28px;
    max-width:460px;
  }

  form{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .field-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }

  label{
    display:block;
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:7px;
  }

  input, textarea{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:7px;
    padding:11px 13px;
    color:var(--text);
    font-family:var(--font-body);
    font-size:14px;
    transition:border-color 0.15s ease;
  }

  input:focus, textarea:focus{
    outline:none;
    border-color:var(--accent);
  }

  textarea{resize:vertical; min-height:110px;}

  .form-status{
    font-size:13px;
    color:var(--accent);
    display:none;
  }

  .fallback{
    font-size:13px;
    color:var(--text-dim);
    margin-top:16px;
  }

  .fallback strong{
    color:var(--accent);
    font-family:var(--font-mono);
    font-weight:500;
  }

  /* ---------- FOOTER ---------- */
  footer{
    border-top:1px solid var(--line);
    padding:28px 0 48px;
    text-align:center;
  }

  .footer-socials{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }

  .footer-socials a{
    width:38px;
    height:38px;
    border-radius:9px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--icon-color, var(--surface));
    border:1px solid var(--line);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }

  .footer-socials a svg{width:18px; height:18px; fill:#0B0E14;}

  .footer-socials a:hover{
    transform:translateY(-2px);
    box-shadow:0 0 0 1px var(--icon-color), 0 6px 18px -6px rgba(0,0,0,0.5);
  }

  .copyright{
    font-size:12px;
    color:var(--text-faint);
  }

  .disclaimer{
    font-size:11px;
    color:var(--text-faint);
    max-width:460px;
    margin:12px auto 0;
    line-height:1.6;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:560px){
    .social-grid{grid-template-columns:1fr;}
    .field-row{grid-template-columns:1fr;}
    .broker-top{flex-direction:column; align-items:flex-start;}
    .broker-card{padding:22px;}
    .hero{padding:64px 0 32px;}
    .login-card{padding:28px 20px 24px;}
    .login-logo{width:84px;height:84px;}
    .login-card h2{font-size:26px;}
  }
</style>
</head>

</div>
